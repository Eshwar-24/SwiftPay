# ?? Database: H2 replaces PostgreSQL ?????????????????????????????????????????
spring.datasource.url=jdbc:h2:mem:swiftpay;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.h2.Driver

# Switch dialect to H2 (overrides PostgreSQLDialect from main config)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# ?? Redis: disable auto-config so MockBean takes over ????????????????????????
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

## Also neutralise the old spring.redis.* keys your main config sets
#spring.redis.host=localhost
#spring.redis.port=6379
#spring.data.redis.host=localhost
#spring.data.redis.port=6379

# ?? Kafka: EmbeddedKafka port is injected by @TestPropertySource ?????????????
# Do NOT set spring.kafka.bootstrap-servers here ? the test annotation owns it
spring.kafka.consumer.group-id=swiftpay-test-group
spring.kafka.producer.acks=1
spring.kafka.producer.retries=0
spring.kafka.producer.properties.enable.idempotence=false

# ?? Misc ??????????????????????????????????????????????????????????????????????
logging.level.com.hackathon.SwiftPay=DEBUG
logging.level.org.springframework.kafka=WARN