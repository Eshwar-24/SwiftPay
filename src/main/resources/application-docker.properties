# Application Configuration
spring.application.name=SwiftPay
server.port=8080

# PostgreSQL Configuration - Docker environment
spring.datasource.url=jdbc:postgresql://postgres:5432/swiftpay
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Redis Configuration - Docker environment
spring.redis.host=redis
spring.redis.port=6379
spring.redis.timeout=60000
spring.redis.database=0
spring.redis.jedis.pool.max-active=20
spring.redis.jedis.pool.max-idle=10
spring.redis.jedis.pool.min-idle=5

# Kafka Configuration - Docker environment
spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.consumer.group-id=swiftpay-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.max-poll-records=100
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.compression-type=snappy

# Kafka Topics
kafka.topic.payment-initiated=payment-initiated
kafka.topic.payment-completed=payment-completed
kafka.topic.payment-failed=payment-failed

# Logging
logging.level.root=INFO
logging.level.com.hackathon.SwiftPay=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.hibernate.SQL=DEBUG

# OpenAPI Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.metrics.export.simple.enabled=true

